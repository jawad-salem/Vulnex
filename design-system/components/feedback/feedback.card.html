<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { background: var(--bg-primary); padding: 20px; }
  .demo-label { font-size: 10px; text-transform: uppercase; letter-spacing: .5px; color: var(--text-muted); font-weight: 600; margin: 0 0 10px; }
  .row { display:flex; align-items:center; gap: 14px; margin-bottom: 18px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Alert, ProgressBar, EmptyState, Button } = window.VulnexDesignSystem_3350b3;
function Demo() {
  return (
    <div>
      <Alert tone="success" dismissible>Report generated successfully.</Alert>
      <Alert tone="error">Invalid CVSS vector string.</Alert>
      <div className="demo-label" style={{marginTop:6}}>Progress</div>
      <div className="row">
        <ProgressBar value={62} />
        <span className="text-sm text-secondary">62% coverage</span>
        <ProgressBar value={14} max={20} mini />
        <span className="text-sm text-secondary">14 / 20</span>
      </div>
      <div className="card" style={{marginBottom:0}}>
        <EmptyState
          icon={<i data-lucide="shield-off"></i>}
          title="No findings yet"
          subtitle="Add a finding manually or import results from a scanner."
          action={<Button variant="primary">Add first finding</Button>}
        />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
setTimeout(() => window.lucide && window.lucide.createIcons({ attrs: { 'stroke-width': 2 } }), 60);
</script>
</body>
</html>
