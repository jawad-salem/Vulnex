<!-- @dsCard group="Colors" viewport="700x190" name="Surfaces" subtitle="Near-black surface scale — depth via background steps, not shadow" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { background: var(--bg-primary); padding: 20px; }
  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
  .sw { border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
  .chip { height: 64px; }
  .meta { padding: 8px 10px; background: var(--bg-secondary); }
  .name { font-size: 11px; font-weight: 600; color: var(--text-primary); }
  .hex { font-family: var(--font-mono); font-size: 10px; color: var(--text-secondary); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#0d1117"></div><div class="meta"><div class="name">primary</div><div class="hex">#0d1117</div></div></div>
    <div class="sw"><div class="chip" style="background:#161b22"></div><div class="meta"><div class="name">secondary</div><div class="hex">#161b22</div></div></div>
    <div class="sw"><div class="chip" style="background:#1f2638"></div><div class="meta"><div class="name">tertiary/card</div><div class="hex">#1f2638</div></div></div>
    <div class="sw"><div class="chip" style="background:#252d42"></div><div class="meta"><div class="name">hover</div><div class="hex">#252d42</div></div></div>
    <div class="sw"><div class="chip" style="background:#353c4a"></div><div class="meta"><div class="name">border</div><div class="hex">#353c4a</div></div></div>
    <div class="sw"><div class="chip" style="background:#262c3a"></div><div class="meta"><div class="name">border-light</div><div class="hex">#262c3a</div></div></div>
  </div>
</body>
</html>
