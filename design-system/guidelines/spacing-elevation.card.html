<!-- @dsCard group="Spacing" viewport="700x180" name="Elevation & borders" subtitle="Depth from 1px borders & bg steps — shadow only on focus & popovers" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { background: var(--bg-primary); padding: 22px; display:flex; gap: 16px; align-items:stretch; }
  .item { flex:1; display:flex; flex-direction:column; gap: 10px; }
  .box { flex:1; border-radius: var(--radius-lg); display:flex; align-items:center; justify-content:center; font-size:11px; color: var(--text-secondary); min-height: 70px; }
  .cap { font-size: 11px; color: var(--text-primary); font-weight: 600; }
  .sub { font-family: var(--font-mono); font-size: 9.5px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="item">
    <div class="box" style="background:var(--bg-card); border:1px solid var(--border)">card</div>
    <div class="cap">Border default</div><div class="sub">1px #353c4a</div>
  </div>
  <div class="item">
    <div class="box" style="background:var(--bg-input); border:1px solid var(--accent); box-shadow:0 0 0 3px var(--accent-bg)">input :focus</div>
    <div class="cap">Focus ring</div><div class="sub">0 0 0 3px accent-bg</div>
  </div>
  <div class="item">
    <div class="box" style="background:var(--bg-card); border:1px solid var(--border); box-shadow:0 14px 30px rgba(0,0,0,.55)">popover</div>
    <div class="cap">Popover shadow</div><div class="sub">0 14px 30px /55</div>
  </div>
</body>
</html>
