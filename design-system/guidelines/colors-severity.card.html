<!-- @dsCard group="Colors" viewport="700x150" name="Severity scale" subtitle="Five-step severity ramp — the product's most-used color signal" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { background: var(--bg-primary); padding: 20px; }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .sw { border-radius: var(--radius); padding: 12px; border:1px solid var(--border-light); }
  .dot { width: 28px; height: 28px; border-radius: var(--radius-full); margin-bottom: 10px; }
  .name { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .3px; }
  .hex { font-family: var(--font-mono); font-size: 10px; color: var(--text-secondary); margin-top: 3px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="dot" style="background:#f05853"></div><div class="name" style="color:#f05853">Critical</div><div class="hex">#f05853</div></div>
    <div class="sw"><div class="dot" style="background:#f09236"></div><div class="name" style="color:#f09236">High</div><div class="hex">#f09236</div></div>
    <div class="sw"><div class="dot" style="background:#e3b341"></div><div class="name" style="color:#e3b341">Medium</div><div class="hex">#e3b341</div></div>
    <div class="sw"><div class="dot" style="background:#58a6ff"></div><div class="name" style="color:#58a6ff">Low</div><div class="hex">#58a6ff</div></div>
    <div class="sw"><div class="dot" style="background:#8b949e"></div><div class="name" style="color:#8b949e">Info</div><div class="hex">#8b949e</div></div>
  </div>
</body>
</html>
