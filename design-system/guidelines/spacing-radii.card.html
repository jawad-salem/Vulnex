<!-- @dsCard group="Spacing" viewport="700x150" name="Radii" subtitle="Four radii — chips, controls, cards, pills" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { background: var(--bg-primary); padding: 20px; display:flex; gap: 18px; align-items:flex-end; }
  .item { display:flex; flex-direction:column; align-items:center; gap: 8px; }
  .box { width: 80px; height: 60px; background: var(--bg-tertiary); border: 1px solid var(--border); }
  .name { font-size: 11px; color: var(--text-primary); font-weight:600; }
  .val { font-family: var(--font-mono); font-size: 10px; color: var(--text-secondary); }
  .pill { width: 110px; height: 34px; border-radius: var(--radius-pill); display:flex; align-items:center; justify-content:center; }
</style>
</head>
<body>
  <div class="item"><div class="box" style="border-radius:4px"></div><div class="name">sm</div><div class="val">4px</div></div>
  <div class="item"><div class="box" style="border-radius:8px"></div><div class="name">radius</div><div class="val">8px</div></div>
  <div class="item"><div class="box" style="border-radius:12px"></div><div class="name">lg</div><div class="val">12px</div></div>
  <div class="item"><div class="box pill"><span class="val" style="color:var(--accent-light)">pill</span></div><div class="name">pill</div><div class="val">20px</div></div>
  <div class="item"><div class="box" style="border-radius:50%; width:60px"></div><div class="name">full</div><div class="val">avatars</div></div>
</body>
</html>
