<!-- @dsCard group="Type" viewport="700x270" name="Type scale" subtitle="Compact px scale on a 13px body — dense product UI" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { background: var(--bg-primary); padding: 22px; color: var(--text-primary); }
  .r { display:flex; align-items:baseline; gap: 16px; padding: 6px 0; border-bottom: 1px solid var(--border-light); }
  .r:last-child { border:none; }
  .tok { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); width: 130px; flex-shrink:0; }
  .ex { font-family: var(--font); color: var(--text-primary); }
</style>
</head>
<body>
  <div class="r"><span class="tok">3xl · 28/700</span><span class="ex" style="font-size:28px;font-weight:700;letter-spacing:-.3px">Hero & stat values</span></div>
  <div class="r"><span class="tok">2xl · 22/600</span><span class="ex" style="font-size:22px;font-weight:600">Page title</span></div>
  <div class="r"><span class="tok">lg · 15/600</span><span class="ex" style="font-size:15px;font-weight:600">Card title</span></div>
  <div class="r"><span class="tok">md · 14/600</span><span class="ex" style="font-size:14px;font-weight:600">Nav & emphasis</span></div>
  <div class="r"><span class="tok">base · 13/400</span><span class="ex" style="font-size:13px">Default body text and controls</span></div>
  <div class="r"><span class="tok">sm · 12/400</span><span class="ex" style="font-size:12px;color:var(--text-secondary)">Sub-copy, captions, form labels</span></div>
  <div class="r"><span class="tok">xs · 11/600</span><span class="ex" style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;color:var(--text-muted)">Table header · badge</span></div>
</body>
</html>
