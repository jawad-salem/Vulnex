<!-- @dsCard group="Type" viewport="700x180" name="Font families" subtitle="Native UI sans for chrome · developer mono for machine text" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { background: var(--bg-primary); padding: 22px; color: var(--text-primary); display:flex; flex-direction:column; gap: 18px; }
  .fam { border-bottom: 1px solid var(--border-light); padding-bottom: 16px; }
  .fam:last-child { border:none; padding:0; }
  .lab { font-size: 10px; text-transform: uppercase; letter-spacing:.5px; color: var(--text-muted); font-weight:600; margin-bottom: 8px; }
  .sans { font-family: var(--font); font-size: 26px; font-weight: 600; }
  .mono { font-family: var(--font-mono); font-size: 24px; font-weight: 500; color: var(--accent-light); }
  .stack { font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary); margin-top: 6px; }
</style>
</head>
<body>
  <div class="fam">
    <div class="lab">Sans — UI chrome</div>
    <div class="sans">Segoe UI · headings, body, controls</div>
    <div class="stack">'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif</div>
  </div>
  <div class="fam">
    <div class="lab">Mono — machine text</div>
    <div class="mono">JetBrains Mono 0123456789 :88 CVSS</div>
    <div class="stack">'JetBrains Mono', 'Cascadia Code', 'Fira Code', monospace</div>
  </div>
</body>
</html>
