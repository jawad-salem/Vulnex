<!-- @dsCard group="Spacing" viewport="700x160" name="Spacing scale" subtitle="4px-based scale — dense, tabular product rhythm" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { background: var(--bg-primary); padding: 22px; display:flex; flex-direction:column; gap: 9px; }
  .r { display:flex; align-items:center; gap: 14px; }
  .bar { height: 14px; background: var(--accent); border-radius: 2px; }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary); width: 90px; }
  .px { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="r"><span class="tok">space-1</span><div class="bar" style="width:4px"></div><span class="px">4</span></div>
  <div class="r"><span class="tok">space-2</span><div class="bar" style="width:8px"></div><span class="px">8</span></div>
  <div class="r"><span class="tok">space-3</span><div class="bar" style="width:12px"></div><span class="px">12</span></div>
  <div class="r"><span class="tok">space-4</span><div class="bar" style="width:16px"></div><span class="px">16</span></div>
  <div class="r"><span class="tok">space-5</span><div class="bar" style="width:20px"></div><span class="px">20</span></div>
  <div class="r"><span class="tok">space-6</span><div class="bar" style="width:24px"></div><span class="px">24</span></div>
  <div class="r"><span class="tok">space-8</span><div class="bar" style="width:32px"></div><span class="px">32</span></div>
</body>
</html>
