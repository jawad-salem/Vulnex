<!-- @dsCard group="Type" viewport="700x160" name="Mono in use" subtitle="Monospace is a brand signal — hosts, ports, CVSS, scores, scan counts" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { background: var(--bg-primary); padding: 20px; display:flex; flex-wrap:wrap; gap: 12px; align-items:center; }
  .chip { font-family: var(--font-mono); font-size: 13px; background: var(--bg-input); border:1px solid var(--border-light); border-radius: var(--radius-sm); padding: 8px 12px; color: var(--text-primary); }
  .score { font-family: var(--font-mono); font-size: 28px; font-weight: 700; }
  .lbl { font-size: 10px; text-transform:uppercase; letter-spacing:.5px; color: var(--text-muted); width:100%; font-weight:600; }
</style>
</head>
<body>
  <span class="lbl">Machine text rendered in mono</span>
  <span class="chip">dc01.internal.acme.example<span style="color:var(--text-muted)">:88</span></span>
  <span class="chip">192.168.4.21</span>
  <span class="chip">CVSS:3.1/AV:N/AC:L/PR:N</span>
  <span class="score" style="color:var(--critical)">8.8</span>
  <span class="score" style="color:var(--high)">7.4</span>
  <span class="chip">142 hosts</span>
</body>
</html>
