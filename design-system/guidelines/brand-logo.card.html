<!-- @dsCard group="Brand" viewport="700x170" name="Logo" subtitle="Shield mark + wordmark — accent-light on dark, never on light" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { background: var(--bg-primary); padding: 24px; display:flex; gap: 28px; align-items:center; }
  .lockup { display:flex; align-items:center; gap: 10px; }
  .lockup span { font-size: 22px; font-weight: 600; color: var(--accent-light); }
  .mark-on-panel { background: var(--bg-secondary); border:1px solid var(--border); border-radius: var(--radius-lg); padding: 18px 22px; display:flex; align-items:center; gap:10px; }
  .mark-on-panel span { font-size: 16px; font-weight: 600; color: var(--accent-light); }
  .cap { font-size: 10px; color: var(--text-muted); text-transform:uppercase; letter-spacing:.5px; margin-top:8px; }
</style>
</head>
<body>
  <div>
    <div class="lockup">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#a28ff0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      <span>Vulnex</span>
    </div>
    <div class="cap">Primary lockup</div>
  </div>
  <div>
    <div class="mark-on-panel">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#a28ff0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      <span>Vulnex</span>
    </div>
    <div class="cap">Sidebar brand</div>
  </div>
</body>
</html>
