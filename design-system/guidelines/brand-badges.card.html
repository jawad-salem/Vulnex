<!-- @dsCard group="Brand" viewport="700x200" name="Badges in use" subtitle="Pill badges carry severity, finding status & review state" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { background: var(--bg-primary); padding: 20px; display:flex; flex-direction:column; gap: 14px; }
  .grp { display:flex; flex-direction:column; gap: 8px; }
  .lbl { font-size: 10px; text-transform: uppercase; letter-spacing:.5px; color: var(--text-muted); font-weight:600; }
  .row { display:flex; gap: 8px; flex-wrap:wrap; }
</style>
</head>
<body>
  <div class="grp">
    <div class="lbl">Severity</div>
    <div class="row">
      <span class="badge badge-critical">Critical</span>
      <span class="badge badge-high">High</span>
      <span class="badge badge-medium">Medium</span>
      <span class="badge badge-low">Low</span>
      <span class="badge badge-info">Info</span>
    </div>
  </div>
  <div class="grp">
    <div class="lbl">Finding status</div>
    <div class="row">
      <span class="badge badge-open">Open</span>
      <span class="badge badge-confirmed">Confirmed</span>
      <span class="badge badge-remediated">Remediated</span>
      <span class="badge badge-accepted">Accepted</span>
      <span class="badge badge-false_positive">False positive</span>
    </div>
  </div>
  <div class="grp">
    <div class="lbl">Review state &middot; SLA</div>
    <div class="row">
      <span class="badge badge-draft">Draft</span>
      <span class="badge badge-in_review">In review</span>
      <span class="badge badge-approved">Approved</span>
      <span class="badge badge-overdue">Overdue</span>
      <span class="badge badge-on_track">On track</span>
    </div>
  </div>
</body>
</html>
