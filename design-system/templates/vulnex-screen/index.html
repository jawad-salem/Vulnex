<!-- @template name="Vulnex app screen" description="Dark Vulnex web-app scaffold — fixed sidebar, global search, page header and a content card, ready to fill." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vulnex — new screen</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="./ds-base.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
window.addEventListener('DOMContentLoaded', () => {
  const NS = window.VulnexDesignSystem_3350b3 || {};
  const { Card, StatCard, Button, Badge, EmptyState } = NS;

  // Minimal inline shield + nav icons (Lucide-style, 2px stroke).
  const Ic = ({ d, size = 18 }) => (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor"
         strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" dangerouslySetInnerHTML={{ __html: d }} />
  );
  const NAV = [
    ['Dashboard', '<rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>', true],
    ['Engagements', '<path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>'],
    ['Clients', '<path d="M3 21h18"/><path d="M5 21V7l7-4 7 4v14"/>'],
    ['Users', '<path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/>'],
  ];

  function Screen() {
    return (
      <div className="layout">
        <aside className="sidebar">
          <div className="sidebar-brand">
            <Ic d='<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>' size={24} />
            <span>Vulnex</span>
          </div>
          <nav className="sidebar-nav">
            {NAV.map(([label, d, active]) => (
              <a key={label} href="#" className={'nav-item' + (active ? ' active' : '')} onClick={(e)=>e.preventDefault()}>
                <Ic d={d} /> {label}
              </a>
            ))}
          </nav>
          <div className="sidebar-bottom">
            <a href="#" className="nav-item" onClick={(e)=>e.preventDefault()}>
              <span className="avatar-sm" style={{background:'#7a60e0'}}>AD</span> admin
            </a>
          </div>
        </aside>
        <main className="main-content">
          <form className="global-search" onSubmit={(e)=>e.preventDefault()}>
            <span className="global-search-icon"><Ic d='<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>' size={16} /></span>
            <input className="global-search-input" placeholder="Search findings, engagements, hosts…  (press /)" />
          </form>

          {/* ── Your screen starts here ── */}
          <div className="page-header">
            <div>
              <h1 className="page-title">New screen</h1>
              <p className="page-subtitle">Replace this with your view</p>
            </div>
            <Button variant="primary">+ Primary action</Button>
          </div>

          <div className="stats-grid">
            <StatCard label="Metric one" value="0" />
            <StatCard label="Metric two" value="0" />
            <StatCard label="Critical / High" value="0" valueTone="critical" sub="0 high" subTone="high" />
          </div>

          <Card title="Section title" actions={<Badge tone="in_review">In review</Badge>}>
            <EmptyState
              icon={<Ic d='<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>' size={22} />}
              title="Start building"
              subtitle="Compose Vulnex components here — tables, badges, tabs, KPI strips, phase steppers."
            />
          </Card>
        </main>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<Screen />);
});
</script>
</body>
</html>
