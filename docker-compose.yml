services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vulnex
      POSTGRES_USER: vulnex
      POSTGRES_PASSWORD: vulnex
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vulnex -d vulnex"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: .
    image: vulnex:local
    # Disable IPv6 in the container. On some VM/Docker networks the container
    # has no IPv6 route, so outbound connections to dual-stack hosts (e.g.
    # smtp.gmail.com) try IPv6 first and fail with "Network is unreachable".
    # Forcing IPv4-only resolves it.
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    ports:
      - "8000:8000"
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?DJANGO_SECRET_KEY must be set in .env}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      DJANGO_USE_HTTPS: ${DJANGO_USE_HTTPS:-False}
      DATABASE_URL: postgres://vulnex:vulnex@db:5432/vulnex
      SITE_URL: ${SITE_URL:-http://localhost:8000}
      VAULT_MASTER_KEY: ${VAULT_MASTER_KEY:-}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      DJANGO_BOOTSTRAP_USERNAME: ${DJANGO_BOOTSTRAP_USERNAME:-admin}
      DJANGO_BOOTSTRAP_PASSWORD: ${DJANGO_BOOTSTRAP_PASSWORD:-admin1}
      DJANGO_BOOTSTRAP_EMAIL: ${DJANGO_BOOTSTRAP_EMAIL:-admin@example.com}
      SEED_DEMO: ${SEED_DEMO:-1}
      # Email — pulled from the host .env (compose reads ./.env for ${...}).
      # Without these the container falls back to the console backend and
      # "sends" mail to its own logs instead of a real inbox.
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
      EMAIL_HOST: ${EMAIL_HOST:-smtp.gmail.com}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      DEFAULT_FROM_EMAIL: "${DEFAULT_FROM_EMAIL:-Vulnex <noreply@vulnex.local>}"
    volumes:
      - static_data:/app/staticfiles
      - media_data:/app/media
      - protected_media_data:/app/protected_media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    build: .
    image: vulnex:local
    user: vulnex
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?DJANGO_SECRET_KEY must be set in .env}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      DATABASE_URL: postgres://vulnex:vulnex@db:5432/vulnex
      VAULT_MASTER_KEY: ${VAULT_MASTER_KEY:-}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - media_data:/app/media
      - protected_media_data:/app/protected_media
    depends_on:
      web:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Celery containers don't serve HTTP, so the image's port-8000 healthcheck
    # would mark them unhealthy. Disable it here.
    healthcheck:
      disable: true
    entrypoint: []
    command: celery -A vulnex worker -l info

  celery-beat:
    build: .
    image: vulnex:local
    user: vulnex
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?DJANGO_SECRET_KEY must be set in .env}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      DATABASE_URL: postgres://vulnex:vulnex@db:5432/vulnex
      VAULT_MASTER_KEY: ${VAULT_MASTER_KEY:-}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      web:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Celery containers don't serve HTTP, so the image's port-8000 healthcheck
    # would mark them unhealthy. Disable it here.
    healthcheck:
      disable: true
    entrypoint: []
    command: celery -A vulnex beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler

volumes:
  postgres_data:
  static_data:
  media_data:
  protected_media_data:
