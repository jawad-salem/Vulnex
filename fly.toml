# Vulnex — Fly.io live demo deployment.
#
# Bring-up:
#   fly launch --no-deploy --copy-config --name vulnex-demo
#   fly postgres create --name vulnex-demo-db --vm-size shared-cpu-1x --volume-size 1
#   fly postgres attach --app vulnex-demo vulnex-demo-db
#   fly redis create --name vulnex-demo-redis           # Upstash, free tier
#   fly redis status vulnex-demo-redis                  # copy the private URL
#   fly secrets set --app vulnex-demo \
#       DJANGO_SECRET_KEY="$(python -c 'from django.core.management.utils import get_random_secret_key; print(get_random_secret_key())')" \
#       VAULT_MASTER_KEY="$(python -c 'from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())')" \
#       CELERY_BROKER_URL="redis://default:<password>@<host>:6379" \
#       CELERY_RESULT_BACKEND="redis://default:<password>@<host>:6379"
#   fly deploy --app vulnex-demo
#
# After first deploy:
#   fly apps open --app vulnex-demo
#   # Sign in as demo-pentester / demo-password.
#
# The release_command runs the same entrypoint script the local Docker image
# uses — migrations, collectstatic, seed_templates / methodologies / demo,
# and superuser bootstrap. Hourly database resets are driven by Celery beat
# (the `worker` process runs `worker -B`), so no Fly Cron is required as long
# as CELERY_BROKER_URL points at a real broker (Upstash Redis above).

app = "vulnex-demo"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  DJANGO_DEBUG = "False"
  DJANGO_USE_HTTPS = "True"
  DJANGO_ALLOWED_HOSTS = "vulnex-demo.fly.dev"
  SITE_URL = "https://vulnex-demo.fly.dev"
  SHOWCASE_MODE = "True"
  SEED_DEMO = "1"
  PORT = "8000"
  # CELERY_BROKER_URL and CELERY_RESULT_BACKEND must be set as secrets
  # (Upstash Redis URL) — see header comment.

[deploy]
  release_command = "/app/entrypoint.sh true"

[processes]
  web = "gunicorn vulnex.wsgi:application --bind 0.0.0.0:8000 --workers 2 --access-logfile -"
  worker = "celery -A vulnex worker -B -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["web"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "30s"
    method = "get"
    path = "/accounts/login/"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
